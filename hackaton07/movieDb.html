<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Db</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --deep: #080a0f;
      --surface: #0f1117;
      --card: #141720;
      --border: rgba(201, 168, 76, 0.15);
    }

    * {
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--deep);
      color: #e8e2d5;
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* GRID */
    .movie-card {
      animation: fadeCard 0.5s ease both;
    }

    @keyframes fadeCard {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 16px;
    }

    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 10, 15, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    #search-input {
      background-color: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: #e8e2d5;
      transition: all 0.3s ease;
    }

    #hero-banner {
      position: relative;
      height: 400px;
      overflow: hidden;
      background: var(--surface);
    }

    #hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      filter: blur(2px) brightness(0.35);
      transform: scale(1.05);
      transition: all 0.8s ease;
    }

    #hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px 48px;
      background: linear-gradient(
        to top,
        rgba(8, 10, 15, 0.95) 0%,
        rgba(8, 10, 15, 0.3) 60%,
        transparent 100%
      );
    }
  </style>
  <body class="">
    <!-- Pogress Bar -->
    <div class="progress-bar" id="progress-bar"></div>

    <!-- HEADER -->
    <header id="header">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-6">
        <div
          class="flex items-center gap-3 flex-shrink-0 cursor-pointer"
          id="logo_btn"
        >
          <div
            class="w-8 h-8 rounded-full border-2 flex items-center justify-center"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              style="color: var(--gold)"
            >
              <polygon points="23 7 16 12 23 17 23 7" />
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
            </svg>
          </div>
          <span>Movie Db</span>
        </div>

        <!-- Search -->
        <div class="flex-1 relative max-w-lg">
          <input
            id="search-input"
            type="text"
            placeholder="Buscar películas, directores, géneros..."
            class="w-full pl-10 pr-4 py-2.5 rounded-lg text-sm"
          />
        </div>

        <!-- Navigator -->
        <nav class="md:flex items-center gap-6 text-sm opacity-65">
          <span class="cursor-pointer hover:opacity-100 transition-opacity"
            >Popular</span
          >
        </nav>
      </div>
    </header>

    <!-- Vista principal -->

    <div id="home-view">
      <!-- Contanido Principal -->
      <!-- Hero Banner -->
      <div id="hero-banner">
        <div id="hero-bg"></div>
        <div id="hero-content">
          <div class="max-w-2xl">
            <span id="hero-genre" class="genre-pill text-xs mb-3 inline-block"
              >Cargando...</span
            >
            <h1
              class="font-display text-5xl md:text-6xl font-black leading-none mb-3"
              id="hero-title"
            ></h1>
            <p
              class="text-sm opacity-70 mb-5 max-w-md leading-relaxed line-clamp-3"
              id="hero-overview"
            ></p>
            <div class="flex items-center gap-4">
              <button
                id="hero-btn"
                class="px-6 py-2.5 rounded-lg text-sm font-medium transition-all"
                style="background: var(--gold); color: #08090f"
                onmouseover="this.style.background = 'var(--gold-light)'"
                onmouseout="this.style.background = 'var(--gold)'"
              >
                Ver detalles →
              </button>
              <div class="flex items-center gap-2 text-sm opacity-60">
                <svg
                  width="14"
                  height="14"
                  fill="var(--gold)"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                  />
                </svg>
                <span
                  id="hero-rating"
                  class="font-medium"
                  style="color: var(--gold-light)"
                ></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <main class="max-w-7xl mx-auto px-6 py-10">
        <!-- Search Result -->
         <div class="" id="search-results-section">
            <div class="section-divider">
                <h2 class="font-display text-2xl font-bold">Resultados de busqueda</h2>
                <span id="search-count" class="text-xs opacity-40 ml-2"></span>
            </div>
            <div id="search-results-grid" class="section-movies">
            </div>

            <div id="search-empty">
                <p>Sin resultados</p>
                <p>Intenta con otro nombre</p>
            </div>
         </div>
        <!-- home section -->
        <div id="home-sections" class="">
          <!-- Now Playing -->
          <section id="section-now_playing" class="mb-14">
            <div class="section-divider">
              <p class="text-xs font-hero tracking-widest mb-0.5">En cines</p>
              <h2 class="font-display text-3xl font-bold leading-none">
                Ahora en Cartelera
              </h2>
            </div>
            <div id="grid-now_playing" class="section-movies">
              <div class="col-span-full flex justify-center py-8">
                <div class="spinner"></div>
              </div>
            </div>
          </section>

          <!-- Popular -->
          <section id="section-popular" class="mb-14">
            <div class="section-divider">
              <p class="text-xs font-hero tracking-widest mb-0.5">Tendencia</p>
              <h2 class="font-display text-3xl font-bold leading-none">
                Mas populares
              </h2>
            </div>
            <div id="grid-popular" class="section-movies">
              <div class="col-span-full flex justify-center py-8">
                <div class="spinner"></div>
              </div>
            </div>
          </section>

          <!-- Top Rated -->
          <section id="section-top_rated" class="mb-14">
            <div class="section-divider">
              <p class="text-xs font-hero tracking-widest mb-0.5">Lo mejor</p>
              <h2 class="font-display text-3xl font-bold leading-none">
                Mejor Valorado
              </h2>
            </div>
            <div id="grid-top_rated" class="section-movies">
              <div class="col-span-full flex justify-center py-8">
                <div class="spinner"></div>
              </div>
            </div>
          </section>

          <!-- upcoming -->
          <section id="section-upcoming" class="mb-14">
            <div class="section-divider">
              <p class="text-xs font-hero tracking-widest mb-0.5">
                Proximamente
              </p>
              <h2 class="font-display text-3xl font-bold leading-none">
                Proximos estrenos
              </h2>
            </div>
            <div id="grid-upcoming" class="section-movies">
              <div class="col-span-full flex justify-center py-8">
                <div class="spinner"></div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
  <script>
    const BEARER =
      "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI0NzQ2MDY0Y2EwZDkyZDMzMmY4OGM4MTMyMTk1ZWVjMiIsIm5iZiI6MTY0NjM0MTg0MC40MzM5OTk4LCJzdWIiOiI2MjIxMmVkMDkwMjAxMjAwMWJkODNiNjYiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.Bmr1C2JDaBTvSPdWoDnEtlOO2iU0XQjlGJZ1DgdFKII";
    const BASE = "https://api.themoviedb.org/3";
    const IMG = "https://image.tmdb.org/t/p/";
    const LANG = "es-MX";

    const headers = {
      Authorization: `Bearer ${BEARER}`,
      "Content-Type": "application/json",
    };

    async function api(path, params = {}) {
      const q = new URLSearchParams({ language: LANG, ...params });
      const res = await fetch(`${BASE}${path}?${q}`, { headers });
      return res.json();
    }

    // Map of geners
    let genreMap = {};

    async function loadGenred() {
      const data = await api("/genre/movie/list");
      data.genres?.forEach((g) => (genreMap[g.id] = g.name));
    }

    // Sections
    function createCard(movie, delay = 0) {
      const div = document.createElement("div");
      div.className = "movie-card";
      div.style.animationDelay = `${delay}ms`;

      const rating = movie.vote_average?.toFixed(1) || "-";
      const poster = movie.poster_path
        ? `${IMG}w342${movie.poster_path}`
        : `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 342 513'%3E%3Crect fill='%23141720' width='342' height='513'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23333' font-size='48'%3E🎬%3C/text%3E%3C/svg%3E`;

      div.innerHTML = `
    <div class="relative">
      <img src="${poster}" alt="${movie.title}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 342 513%22%3E%3Crect fill=%22%23141720%22 width=%22342%22 height=%22513%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23444%22 font-size=%2248%22%3E🎬%3C/text%3E%3C/svg%3E'"/>
      <div class="rating-badge">★ ${rating}</div>
      <div class="card-overlay">
        <p class="font-medium text-xs leading-tight">${movie.title}</p>
        <p class="text-xs opacity-40 mt-0.5">${(movie.release_date || "").slice(0, 4)}</p>
      </div>
    </div>`;
      div.onclick = () => {
        alert("clikc");
      };

      return div;
    }
    const renderGrid = (gridId, movies) => {
      console.log("grid id", gridId);
      const grid = document.getElementById(gridId);
      grid.innerHTML = "";
      if (!movies?.length) {
        grid.innerHTML =
          '<p class="opacity-30 text-sm col-span-full py-4">sin Resultados</p>';
      }

      movies
        .slice(0, 12)
        .forEach((m, index) => grid.appendChild(createCard(m, index * 40)));
    };

    function setupHero(movies) {
      const m = movies[Math.floor(Math.random() * Math.min(5, movies.length))];
      if (!m) return;
      console.log(m);
      document.getElementById("hero-bg").style.backgroundImage =
        `url(${IMG}w1280${m.backdrop_path})`;
      document.getElementById("hero-title").textContent = m.title || m.name;
      document.getElementById("hero-overview").textContent = m.overview;
      document.getElementById("hero-rating").textContent =
        m.vote_average?.toFixed(1);
      const g = m.genre_ids?.[0];
      document.getElementById("hero-genre").textContent = g
        ? genreMap[g] || ""
        : "";
      document.getElementById("hero-btn").onclick = () => alert("Click");
    }

    const sections = [
      {
        key: "now_playing",
        path: "/movie/now_playing",
      },
      {
        key: "popular",
        path: "/movie/popular",
      },
      {
        key: "top_rated",
        path: "/movie/top_rated",
      },
      {
        key: "upcoming",
        path: "/movie/upcoming",
      },
    ];

    async function loadSections() {
      await loadGenred();

      let heroSet = false;
      for (const s of sections) {
        const data = await api(s.path);
        // renderizar el grid
        renderGrid(`grid-${s.key}`, data.results);

        if (!heroSet && s.key === "now_playing" && data.results?.length) {
          // Mostrar el hero
          setupHero(data.results);

          heroSet = true;
        }
      }
    }

    // SEarch
    let searchTimer;
    const searchInput = document.getElementById("search-input");

    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(doSearch, 350);
    });

    async function doSearch() {
      const q = searchInput.value.trim();
      const homeSec = document.getElementById("home-sections");
      const searchSec = document.getElementById("search-results-section");
      const hero = document.getElementById("hero-banner");
      const empty = document.getElementById("search-empty");
      const grid = document.getElementById("search-results-grid");
      const count = document.getElementById("search-input");

      if (!q) {
        searchSec.style.display = "none";
        homeSec.style.display = "block";
        hero.style.display = "block";
        return;
      }

      hero.style.display = "none";
      homeSec.style.display = "none";
      searchSec.style.display = "block";
      grid.innerHTML = `<div class="col-span-full flex justify-center py-8"><div class="spinner"></div></div>`;
      empty.classList.add("hidden");

      const data = await api("/search/movie", { query: q });
      grid.innerHTML = "";

      if (!data.results?.length) {
        empty.classList.remove("hidden");
        count.textContent = "";
        return;
      }

      count.textContent = `${data.total_results} encontradas`;
      data.results
        .slice(0, 20)
        .forEach((m, i) => grid.appendChild(createCard(m, i * 30)));
    }

    loadSections();
  </script>
</html>
